# Server port (job-api role binds HTTP; worker role still starts a thin web context).
server.port=${PORT:3000}

# JobRunr: the background-job-server actually processes jobs. Only the worker
# role enables it; the api role just enqueues. The dashboard stays off.
org.jobrunr.background-job-server.enabled=${JOBRUNR_WORKER:false}
org.jobrunr.background-job-server.worker-count=${WORKER_CONCURRENCY:1}
org.jobrunr.dashboard.enabled=false
org.jobrunr.miscellaneous.allow-anonymous-data-usage=false
