server:
  port: ${PORT:3000}

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  role: ${APP:api}
  rate:
    capacity: ${RATE_CAPACITY:5}
    refillPerSec: ${RATE_REFILL_PER_SEC:5}
  worker:
    limitMax: ${LIMIT_MAX:10}
    limitDurationMs: ${LIMIT_DURATION_MS:1000}
